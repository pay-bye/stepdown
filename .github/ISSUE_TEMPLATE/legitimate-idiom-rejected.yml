name: Legitimate idiom rejected
description: Report valid Go source rejected by the grammar.
title: "Legitimate idiom rejected: "
body:
  - type: input
    id: version
    attributes:
      label: stepdown version
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Do not include production-system identity, secrets, customer data, or private code.
    validations:
      required: true
  - type: textarea
    id: adr-rule
    attributes:
      label: ADR-0001 rule that appears too narrow
    validations:
      required: true
